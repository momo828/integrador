<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .card {
      border-radius: 12px;
      text-align: center;
      padding: 20px;
    }
    .numero {
      font-size: 2.5rem;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- ⭐ MENÚ DE NAVEGACIÓN -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Mi CRUD</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link" href="index.html">Registrar persona</a></li>
        <li class="nav-item"><a class="nav-link" href="personas.html">Tarjetas multimedia</a></li>
        <li class="nav-item"><a class="nav-link" href="documentos.html">Solo documentos</a></li>
        <li class="nav-item"><a class="nav-link" href="redes.html">Solo redes sociales</a></li>
        <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>

      </ul>
    </div>
  </div>
</nav>

<!-- ⭐ DASHBOARD -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Dashboard de Estadísticas</h2>

  <div class="row g-4">

    <div class="col-md-3">
      <div class="card shadow bg-primary text-white">
        <h5>Total de Personas</h5>
        <div id="total" class="numero">0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow bg-danger text-white">
        <h5>Con Video</h5>
        <div id="videos" class="numero">0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow bg-success text-white">
        <h5>Con Documento</h5>
        <div id="documentos" class="numero">0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card shadow bg-warning text-dark">
        <h5>Con Redes Sociales</h5>
        <div id="redes" class="numero">0</div>
      </div>
    </div>

  </div>
</div>

<!-- ⭐ SCRIPT PARA CALCULAR ESTADÍSTICAS -->
<script>
async function cargarDashboard() {
  const res = await fetch("/personas");
  const personas = await res.json();

  // Total
  document.getElementById("total").textContent = personas.length;

  // Con video
  const conVideo = personas.filter(p => p.video_url && p.video_url.trim() !== "").length;
  document.getElementById("videos").textContent = conVideo;

  // Con documento
  const conDocumento = personas.filter(p => p.documento_url && p.documento_url.trim() !== "").length;
  document.getElementById("documentos").textContent = conDocumento;

  // Con redes sociales
  const conRedes = personas.filter(p => (p.instagram || p.linkedin)).length;
  document.getElementById("redes").textContent = conRedes;
}

cargarDashboard();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
