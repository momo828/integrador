<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrar Persona</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .card {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- ⭐ MENÚ DE NAVEGACIÓN -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Mi CRUD</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link active" href="index.html">Registrar persona</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="personas.html">Tarjetas multimedia</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="documentos.html">Solo documentos</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="redes.html">Solo redes sociales</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ⭐ FORMULARIO -->
<div class="container mt-4">
  <div class="card p-4 shadow">
    <h2 class="text-center mb-4">Registrar Persona</h2>

    <form id="personaForm">

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-control" id="nombre" required>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Email</label>
          <input type="email" class="form-control" id="email" required>
        </div>

        <div class="col-md-4 mb-3">
          <label class="form-label">Edad</label>
          <input type="number" class="form-control" id="edad" required>
        </div>
      </div>

      <hr>

      <h5>Medios digitales</h5>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Foto (URL)</label>
          <input type="text" class="form-control" id="foto_url">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Video YouTube (URL)</label>
          <input type="text" class="form-control" id="video_url">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Ubicación Google Maps (URL)</label>
          <input type="text" class="form-control" id="ubicacion_url">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">Documento PDF (Google Drive)</label>
          <input type="text" class="form-control" id="documento_url">
        </div>
      </div>

      <hr>

      <h5>Redes sociales</h5>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label">Instagram</label>
          <input type="text" class="form-control" id="instagram">
        </div>

        <div class="col-md-6 mb-3">
          <label class="form-label">LinkedIn</label>
          <input type="text" class="form-control" id="linkedin">
        </div>
      </div>

      <div class="text-center mt-3">
        <button type="submit" class="btn btn-primary px-4">Guardar</button>
      </div>

    </form>
  </div>
</div>

<!-- ⭐ SCRIPT PARA GUARDAR PERSONA -->
<script>
document.getElementById("personaForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    nombre: document.getElementById("nombre").value,
    email: document.getElementById("email").value,
    edad: document.getElementById("edad").value,
    foto_url: document.getElementById("foto_url").value,
    video_url: document.getElementById("video_url").value,
    ubicacion_url: document.getElementById("ubicacion_url").value,
    documento_url: document.getElementById("documento_url").value,
    instagram: document.getElementById("instagram").value,
    linkedin: document.getElementById("linkedin").value
  };

  const res = await fetch("/personas", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  if (res.ok) {
    alert("Persona registrada correctamente");
    document.getElementById("personaForm").reset();
  } else {
    alert("Error al registrar persona");
  }
});
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
