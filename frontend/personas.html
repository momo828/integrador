<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarjetas Multimedia</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #F5F6FA;
    }

    .navbar {
      background-color: #0A3D62 !important;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    iframe {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- ⭐ MENÚ DE NAVEGACIÓN -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="home.html">Mi CRUD</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item"><a class="nav-link" href="home.html">Inicio</a></li>

        <li class="nav-item"><a class="nav-link" href="index.html">Registrar persona</a></li>

        <li class="nav-item"><a class="nav-link active" href="personas.html">Tarjetas multimedia</a></li>

        <li class="nav-item"><a class="nav-link" href="documentos.html">Solo documentos</a></li>

        <li class="nav-item"><a class="nav-link" href="redes.html">Solo redes sociales</a></li>

        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>

      </ul>
    </div>
  </div>
</nav>

<!-- ⭐ CONTENEDOR DE TARJETAS -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Personas Registradas</h2>
  <div id="contenedor" class="row g-4"></div>
</div>

<!-- ⭐ SCRIPT PARA CARGAR TARJETAS -->
<script>
async function cargarPersonas() {
  const res = await fetch("/personas");
  const personas = await res.json();

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  personas.forEach(p => {
    contenedor.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3">

          <h4>${p.nombre}</h4>
          <p><strong>Email:</strong> ${p.email}</p>
          <p><strong>Edad:</strong> ${p.edad}</p>

          <!-- FOTO -->
          ${p.foto_url ? `<img src="${p.foto_url}" class="img-fluid rounded mb-3">` : ""}

          <!-- VIDEO -->
          ${p.video_url ? `
            <div class="ratio ratio-16x9 mb-3">
              <iframe src="${p.video_url.replace("watch?v=", "embed/")}" allowfullscreen></iframe>
            </div>` : ""}

          <!-- MAPA -->
          ${p.ubicacion_url ? `
            <div class="ratio ratio-16x9 mb-3">
              <iframe src="${p.ubicacion_url}" allowfullscreen></iframe>
            </div>` : ""}

          <!-- DOCUMENTO -->
          ${p.documento_url ? `
            <a href="${p.documento_url}" target="_blank" class="btn btn-outline-primary w-100 mb-2">
              Ver documento PDF
            </a>` : ""}

          <!-- REDES SOCIALES -->
          <div class="d-flex gap-2">
            ${p.instagram ? `<a href="${p.instagram}" target="_blank" class="btn btn-danger btn-sm">Instagram</a>` : ""}
            ${p.linkedin ? `<a href="${p.linkedin}" target="_blank" class="btn btn-primary btn-sm">LinkedIn</a>` : ""}
          </div>

        </div>
      </div>
    `;
  });
}

cargarPersonas();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  </div>
</footer>

</body>
