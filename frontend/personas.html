<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personas Registradas</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body { background-color: #F5F6FA; }

    .navbar { background-color: #0A3D62 !important; }

    .card {
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
    }

    .btn-danger {
      background-color: #c0392b;
      border: none;
    }

    .btn-danger:hover {
      background-color: #e74c3c;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="home.html">Mi Proyecto</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="home.html">Inicio</a></li>
        <li class="nav-item"><a class="nav-link" href="index.html">Registrar persona</a></li>
        <li class="nav-item"><a class="nav-link active" href="personas.html">Tarjetas multimedia</a></li>
        <li class="nav-item"><a class="nav-link" href="documentos.html">Solo documentos</a></li>
        <li class="nav-item"><a class="nav-link" href="redes.html">Solo redes sociales</a></li>
        <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Personas Registradas</h2>

  <div class="row" id="personasContainer"></div>
</div>

<script>
async function cargarPersonas() {
  const res = await fetch("/personas");
  const personas = await res.json();

  const container = document.getElementById("personasContainer");
  container.innerHTML = "";

  personas.forEach(p => {
    const card = document.createElement("div");
    card.className = "col-md-4 mb-4";

    card.innerHTML = `
      <div class="card">
        <img src="${p.foto_url}" alt="Foto">

        <div class="card-body">
          <h5 class="card-title">${p.nombre}</h5>
          <p class="card-text"><strong>Email:</strong> ${p.email}</p>
          <p class="card-text"><strong>Edad:</strong> ${p.edad}</p>

          <a href="${p.video_url}" target="_blank" class="btn btn-primary btn-sm mb-1">Ver video</a>
          <a href="${p.ubicacion_url}" target="_blank" class="btn btn-success btn-sm mb-1">Ver ubicación</a>
          <a href="${p.documento_url}" target="_blank" class="btn btn-secondary btn-sm mb-1">Ver documento</a>

          <div class="mt-2">
            <a href="${p.instagram}" target="_blank" class="btn btn-warning btn-sm">Instagram</a>
            <a href="${p.linkedin}" target="_blank" class="btn btn-info btn-sm">LinkedIn</a>
          </div>

          <button class="btn btn-danger btn-sm mt-3" onclick="eliminarPersona(${p.id})">Eliminar</button>
        </div>
      </div>
    `;

    container.appendChild(card);
  });
}

async function eliminarPersona(id) {
  if (!confirm("¿Eliminar esta persona?")) return;

  const res = await fetch(`/personas/${id}`, { method: "DELETE" });

  if (res.ok) {
    alert("Persona eliminada");
    cargarPersonas();
  } else {
    alert("Error al eliminar");
  }
}

cargarPersonas();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  </div>
