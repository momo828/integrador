<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redes Sociales</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <style>
    body {
      background-color: #f5f5f5;
    }
    .card {
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- ⭐ MENÚ DE NAVEGACIÓN -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Mi CRUD</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="index.html">Registrar persona</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="personas.html">Tarjetas multimedia</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="documentos.html">Solo documentos</a>
        </li>

        <li class="nav-item">
          <a class="nav-link active" href="redes.html">Solo redes sociales</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ⭐ CONTENEDOR DE REDES -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Redes Sociales</h2>
  <div id="contenedor" class="row g-4"></div>
</div>

<!-- ⭐ SCRIPT PARA CARGAR REDES -->
<script>
async function cargarRedes() {
  const res = await fetch("/personas");
  const personas = await res.json();

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  personas.forEach(p => {
    // Solo mostrar si tiene al menos una red social
    if (!p.instagram && !p.linkedin) return;

    contenedor.innerHTML += `
      <div class="col-md-4">
        <div class="card shadow p-3">

          <h5>${p.nombre}</h5>
          <p><strong>Email:</strong> ${p.email}</p>

          <div class="d-flex gap-2 mt-2">
            ${p.instagram ? `<a href="${p.instagram}" target="_blank" class="btn btn-danger btn-sm">Instagram</a>` : ""}
            ${p.linkedin ? `<a href="${p.linkedin}" target="_blank" class="btn btn-primary btn-sm">LinkedIn</a>` : ""}
          </div>

        </div>
      </div>
    `;
  });
}

cargarRedes();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
