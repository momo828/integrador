  <style>
    body {
      background-color: #F5F6FA;
    }

    .navbar {
      background-color: #0A3D62 !important;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .btn-instagram {
      background-color: #E1306C;
      color: white;
      border: none;
    }

    .btn-instagram:hover {
      background-color: #c72a60;
    }

    .btn-linkedin {
      background-color: #0077B5;
      color: white;
      border: none;
    }

    .btn-linkedin:hover {
      background-color: #005f8c;
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="home.html">Mi Proyecto</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">

<!-- ⭐ CONTENEDOR DE REDES -->
<div class="container mt-4">
  <h2 class="text-center mb-4">Redes Sociales</h2>
  <div id="contenedor" class="row g-4"></div>
</div>

<!-- ⭐ SCRIPT PARA CARGAR REDES -->
<script>
async function cargarRedes() {
  const res = await fetch("/personas");
  const personas = await res.json();

  const contenedor = document.getElementById("contenedor");
  contenedor.innerHTML = "";

  personas.forEach(p => {
    if (!p.instagram && !p.linkedin) return;

    contenedor.innerHTML += `
      <div class="col-md-4">
        <div class="card p-3">

          <h5>${p.nombre}</h5>
          <p><strong>Email:</strong> ${p.email}</p>

          <div class="d-flex gap-2 mt-2">
            ${p.instagram ? `<a href="${p.instagram}" target="_blank" class="btn btn-instagram btn-sm">Instagram</a>` : ""}
            ${p.linkedin ? `<a href="${p.linkedin}" target="_blank" class="btn btn-linkedin btn-sm">LinkedIn</a>` : ""}
          </div>

        </div>
      </div>
    `;
  });
}

cargarRedes();
</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
